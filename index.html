<!DOCTYPE html>
<html>
	<body>
		<h1 id="date"></h1>
		<!--h1>Hola</h1-->

		<script>
			var dateObj = new Date();
			var month = ('0' + (dateObj.getMonth() + 1)).slice(-2);
			var date = ('0' + dateObj.getDate()).slice(-2);
			var year = dateObj.getFullYear();
			var format = year + '-' + month + '-' + date;
		
			document.getElementById('date').innerHTML = format
		</script>
	</body>
</html>
