<!DOCTYPE html>
<html>
<span id="date"></span>
<script>
	var dateObj = new Date();
	var month = dateObj.getMonth() + 1;
	var date = dateObj.getDate();
	var year = dateObj.getFullYear();
	var format = year + '-' + month + '-' + date;

	document.getElementById('date').innerHTML = format
</script>
</html>
